services:
    app-dev:
        restart: unless-stopped
        image: posyandu-server:dev
        build:
            context: .
            dockerfile: dockerfile
            target: development
        ports:
            - '${PORT:-3000}:3000'
        environment:
            - NODE_ENV=development
            - TZ=Asia/Jakarta
            - DATABASE_URL=postgresql://${DATABASE_USER}:${DATABASE_PASSWORD}@postgres:5432/${DATABASE_NAME}
        env_file:
            - .env
        volumes:
            - ./src:/app/src
            - bun_cache:/root/.bun
        networks:
            - application
        depends_on:
            postgres:
                condition: service_healthy
        command: ['bun', 'run', 'dev']

