name: Trigger Cron Job

on:
    schedule:
        # Run every 30 minutes to check all tasks (reminders, cleanup, expiry)
        - cron: '*/30 * * * *'
    workflow_dispatch:

jobs:
    trigger:
        runs-on: ubuntu-latest
        steps:
            - name: Trigger Cron Jobs via Endpoint
              run: |
                  curl -X POST "${{ secrets.API_URL }}/api/cron/trigger" \
                  -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                  -H "Content-Type: application/json"
